<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" role="img" aria-label="Local prairie family illustration">
  <defs>
    <linearGradient id="asky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdedfb"/><stop offset="1" stop-color="#fdf3df"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#asky)"/>
  <!-- sun -->
  <circle cx="320" cy="80" r="40" fill="#f2c33c" opacity="0.9"/>
  <!-- clouds -->
  <g fill="#ffffff">
    <ellipse cx="90" cy="80" rx="34" ry="19"/><ellipse cx="118" cy="72" rx="22" ry="14"/>
  </g>
  <!-- rolling hills -->
  <path d="M0 360 Q120 320 240 350 T400 340 V500 H0 Z" fill="#9fd06a"/>
  <path d="M0 392 Q160 360 320 388 T400 380 V500 H0 Z" fill="#7cb82f"/>
  <!-- grain elevator -->
  <g>
    <rect x="56" y="226" width="60" height="150" rx="8" fill="#e2a93c"/>
    <path d="M52 228 L86 192 L120 228 Z" fill="#e4453c"/>
    <rect x="70" y="258" width="14" height="16" rx="3" fill="#1b3a73"/>
    <rect x="90" y="258" width="14" height="16" rx="3" fill="#1b3a73"/>
    <rect x="70" y="290" width="14" height="16" rx="3" fill="#2ba7e2"/>
    <rect x="90" y="290" width="14" height="16" rx="3" fill="#2ba7e2"/>
  </g>
  <!-- hearts -->
  <g fill="#e0277e" opacity=".85">
    <path d="M214 150 c -6 -10 -22 -4 -16 8 c 3 7 16 14 16 14 c 0 0 13 -7 16 -14 c 6 -12 -10 -18 -16 -8z"/>
    <path d="M300 200 c -4 -7 -15 -3 -11 6 c 2 5 11 10 11 10 c 0 0 9 -5 11 -10 c 4 -9 -7 -13 -11 -6z" opacity=".7"/>
  </g>
  <!-- family: two adults + two kids on the hill -->
  <!-- adult 1 -->
  <g transform="translate(150,372)">
    <rect x="-15" y="30" width="11" height="34" rx="5" fill="#3a4a6b"/>
    <rect x="4" y="30" width="11" height="34" rx="5" fill="#3a4a6b"/>
    <rect x="-22" y="-8" width="44" height="46" rx="18" fill="#2ba7e2"/>
    <rect x="20" y="-4" width="12" height="34" rx="6" fill="#2ba7e2" transform="rotate(20 26 13)"/>
    <circle cx="0" cy="-26" r="22" fill="#f6c89a"/>
    <path d="M-22 -28 a22 22 0 0 1 44 0 q-22 -12 -44 0z" fill="#3a2a1a"/>
    <circle cx="-7" cy="-26" r="2.6" fill="#2a2a2a"/><circle cx="7" cy="-26" r="2.6" fill="#2a2a2a"/>
    <path d="M-7 -16 q7 7 14 0" stroke="#2a2a2a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- adult 2 -->
  <g transform="translate(252,372)">
    <rect x="-15" y="30" width="11" height="34" rx="5" fill="#5b3b22"/>
    <rect x="4" y="30" width="11" height="34" rx="5" fill="#5b3b22"/>
    <path d="M-24 38 L24 38 L18 -6 Q0 -16 -18 -6 Z" fill="#e0277e"/>
    <rect x="-32" y="-2" width="12" height="34" rx="6" fill="#e0277e" transform="rotate(-20 -26 15)"/>
    <circle cx="0" cy="-26" r="22" fill="#f6c89a"/>
    <path d="M-22 -30 a22 22 0 0 1 44 4 q-10 16 -22 12 q-12 4 -22 -12z" fill="#6b4a2a"/>
    <circle cx="-7" cy="-26" r="2.6" fill="#2a2a2a"/><circle cx="7" cy="-26" r="2.6" fill="#2a2a2a"/>
    <path d="M-7 -16 q7 7 14 0" stroke="#2a2a2a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- kid 1 -->
  <g transform="translate(202,398)">
    <rect x="-10" y="22" width="8" height="22" rx="4" fill="#3a4a6b"/>
    <rect x="2" y="22" width="8" height="22" rx="4" fill="#3a4a6b"/>
    <rect x="-15" y="0" width="30" height="26" rx="13" fill="#7cb82f"/>
    <circle cx="0" cy="-15" r="16" fill="#f6c89a"/>
    <path d="M-16 -17 a16 16 0 0 1 32 0 q-16 -9 -32 0z" fill="#2a2a2a"/>
    <circle cx="-5" cy="-15" r="2.2" fill="#2a2a2a"/><circle cx="5" cy="-15" r="2.2" fill="#2a2a2a"/>
    <path d="M-5 -7 q5 5 10 0" stroke="#2a2a2a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
  <!-- kid 2 -->
  <g transform="translate(300,402)">
    <rect x="-9" y="20" width="7" height="20" rx="3.5" fill="#444"/>
    <rect x="2" y="20" width="7" height="20" rx="3.5" fill="#444"/>
    <rect x="-13" y="0" width="26" height="24" rx="12" fill="#e2a93c"/>
    <circle cx="0" cy="-14" r="14" fill="#f6c89a"/>
    <path d="M-14 -16 a14 14 0 0 1 28 0 q-14 -8 -28 0z" fill="#5b3b22"/>
    <circle cx="-4.5" cy="-14" r="2" fill="#2a2a2a"/><circle cx="4.5" cy="-14" r="2" fill="#2a2a2a"/>
    <path d="M-4 -7 q4 4 8 0" stroke="#2a2a2a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
