<title>7 Fundays Park · Langham, SK</title>
<meta name="description" content="Langham's indoor prairie playground — a three-storey grain-elevator climber, a wheatfield ball ocean and a rocket trampoline bay. Book a birthday party online. Rain or snow, we're playing." />
<link rel="icon" type="image/png" href="assets/badge.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   7 FUNDAYS PARK — design system
   ============================================================ */
:root{
  /* brand palette (from logo) */
  --navy:#1b3a73;
  --navy-deep:#142c58;
  --sky:#2ba7e2;
  --sky-soft:#bfe4f6;
  --gold:#e2a93c;
  --grass:#6ba82e;
  --grass-deep:#4f8a1f;
  --red:#e4453c;
  --orange:#f2913a;
  --pink:#e0277e;
  --purple:#8c53a6;
  --teal:#2fb9ac;
  --green:#7cb82f;

  /* theme tokens — Prairie Sky (the direction the team landed on) */
  --bg:#fff8ee;
  --bg-tint:#fdeed6;
  --surface:#ffffff;
  --ink:#22304a;
  --ink-soft:#566179;
  --brand:var(--navy);
  --accent:var(--sky);
  --accent-2:var(--gold);
  --accent-3:var(--grass);
  --hero-sky-top:#cdedfb;
  --hero-sky-bot:#eaf7ff;
  --line:#ecdfca;
  --radius:30px;
  --radius-sm:18px;
  --shadow:0 18px 40px -22px rgba(20,44,88,.55);
  --shadow-lift:0 26px 60px -26px rgba(20,44,88,.6);
  --font-display:'Baloo 2', system-ui, sans-serif;
  --font-body:'Nunito', system-ui, sans-serif;
  --motion:1; /* 0 disables transitions/anims */
}

*{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }
@media (prefers-reduced-motion:reduce){ html{ scroll-behavior:auto; } }
body{
  margin:0;
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  font-size:18px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,h4{ font-family:var(--font-display); font-weight:800; line-height:1.04; margin:0; color:var(--brand); letter-spacing:-.01em; }
p{ margin:0; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; border:none; background:none; }
img{ max-width:100%; display:block; }
ul{ margin:0; }

.wrap{ width:min(1180px, 92vw); margin-inline:auto; }
.section{ padding:clamp(64px,9vw,120px) 0; position:relative; }

/* eyebrow */
.eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  font-family:var(--font-display); font-weight:700; font-size:15px;
  letter-spacing:.08em; text-transform:uppercase;
  color:var(--accent);
  background:color-mix(in srgb, var(--accent) 14%, transparent);
  padding:7px 16px; border-radius:999px;
}
.eyebrow .dot{ width:9px;height:9px;border-radius:50%;background:var(--accent); }

.h-xxl{ font-size:clamp(40px,6.4vw,76px); }
.h-xl{ font-size:clamp(32px,4.6vw,54px); }
.h-lg{ font-size:clamp(26px,3vw,38px); }
.lead{ font-size:clamp(18px,1.5vw,21px); color:var(--ink-soft); }

/* buttons */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:10px;
  font-family:var(--font-display); font-weight:700; font-size:18px;
  padding:15px 28px; border-radius:999px; line-height:1;
  transition:calc(var(--motion)*.18s) transform, calc(var(--motion)*.18s) box-shadow, calc(var(--motion)*.18s) background;
  will-change:transform;
  white-space:nowrap;
}
.btn-primary{ background:var(--accent); color:#fff; box-shadow:0 14px 26px -12px color-mix(in srgb,var(--accent) 80%, #000); }
.btn-primary:hover{ transform:translateY(-3px) scale(1.02); box-shadow:0 22px 34px -14px color-mix(in srgb,var(--accent) 80%, #000); }
.btn-sun{ background:var(--gold); color:var(--navy-deep); box-shadow:0 14px 26px -12px rgba(226,169,60,.85); }
.btn-sun:hover{ transform:translateY(-3px) scale(1.02); }
.btn-ghost{ background:var(--surface); color:var(--brand); box-shadow:inset 0 0 0 2.5px color-mix(in srgb,var(--brand) 18%, transparent); }
.btn-ghost:hover{ transform:translateY(-3px); box-shadow:inset 0 0 0 2.5px var(--brand); }
.btn-lg{ font-size:20px; padding:18px 34px; }
.btn[disabled]{ opacity:.4; cursor:not-allowed; transform:none!important; }

/* card */
.card{ background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); }

/* generic reveal-on-scroll */
.reveal{ opacity:0; transform:translateY(26px); transition:calc(var(--motion)*.7s) cubic-bezier(.2,.7,.2,1); }
.reveal.in{ opacity:1; transform:none; }
@media (prefers-reduced-motion:reduce){ .reveal{ opacity:1; transform:none; } }

/* float keyframes */
@keyframes floaty{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-16px) } }
@keyframes floaty-slow{ 0%,100%{ transform:translateY(0) rotate(0) } 50%{ transform:translateY(-22px) rotate(4deg) } }
@keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-8px) } }
@keyframes wiggle{ 0%,100%{ transform:rotate(-3deg) } 50%{ transform:rotate(3deg) } }
@keyframes spin-slow{ to{ transform:rotate(360deg) } }
@keyframes pop-in{ 0%{ transform:scale(.6); opacity:0 } 70%{ transform:scale(1.08) } 100%{ transform:scale(1); opacity:1 } }
@keyframes confetti-fall{ 0%{ transform:translateY(0) rotate(0); opacity:1 } 100%{ transform:translateY(108vh) rotate(720deg); opacity:.9 } }
@media (prefers-reduced-motion:reduce){
  .float,.float-2,[class*="anim-"]{ animation:none!important; }
}

.float{ animation:floaty 6s ease-in-out infinite; }
.float-2{ animation:floaty-slow 8s ease-in-out infinite; }
.anim-wiggle{ animation:wiggle 4s ease-in-out infinite; }

/* photo placeholder */
.ph{
  position:relative; border-radius:var(--radius-sm); overflow:hidden;
  background:
    repeating-linear-gradient(135deg, color-mix(in srgb,var(--accent) 12%, var(--surface)) 0 14px, color-mix(in srgb,var(--accent) 5%, var(--surface)) 14px 28px);
  display:flex; align-items:center; justify-content:center;
  box-shadow:inset 0 0 0 2px color-mix(in srgb,var(--accent) 22%, transparent);
  color:color-mix(in srgb,var(--ink) 55%, transparent);
}
.ph span{
  font-family:'Nunito', monospace; font-weight:700; font-size:13px; letter-spacing:.04em;
  background:var(--surface); padding:6px 12px; border-radius:999px;
  box-shadow:0 4px 10px -6px rgba(0,0,0,.3);
  display:inline-flex; align-items:center; gap:7px; text-transform:none;
}
.ph span::before{ content:"▦"; color:var(--accent); }

/* prairie horizon shapes */
.hill{ display:block; width:100%; }

/* nav */
.nav{
  position:sticky; top:0; z-index:50;
  background:color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter:blur(12px);
  border-bottom:1px solid color-mix(in srgb,var(--line) 70%, transparent);
  transition:calc(var(--motion)*.25s) box-shadow;
}
.nav.scrolled{ box-shadow:0 10px 30px -20px rgba(20,44,88,.5); }
.nav-inner{ display:flex; align-items:center; gap:18px; height:74px; }
.nav-logo{ display:flex; align-items:center; gap:11px; font-family:var(--font-display); font-weight:800; color:var(--brand); font-size:20px; }
.nav-logo img{ height:46px; width:auto; }
.nav-links{ display:flex; align-items:center; gap:4px; margin-left:auto; }
.nav-links a{
  font-family:var(--font-display); font-weight:600; font-size:15.5px; color:var(--ink);
  padding:9px 14px; border-radius:999px; transition:calc(var(--motion)*.15s) all; white-space:nowrap;
}
.nav-links a:hover{ background:color-mix(in srgb,var(--accent) 14%, transparent); color:var(--accent); }
.nav-cta{ margin-left:6px; }
.nav-burger{ display:none; margin-left:auto; width:46px;height:46px;border-radius:14px; background:var(--surface); box-shadow:var(--shadow); align-items:center;justify-content:center; }
.nav-burger span,.nav-burger span::before,.nav-burger span::after{ content:""; display:block; width:22px;height:2.6px;border-radius:2px;background:var(--brand); position:relative; transition:.2s; }
.nav-burger span::before{ position:absolute; top:-7px; } .nav-burger span::after{ position:absolute; top:7px; }
@media (max-width:1080px){
  .nav-links{ display:none; }
  .nav-burger{ display:flex; }
}
.mobile-menu{ display:none; }
.mobile-menu.open{ display:block; padding:8px 0 18px; }
.mobile-menu a{ display:block; font-family:var(--font-display); font-weight:600; padding:13px 10px; border-radius:14px; }
.mobile-menu a:hover{ background:color-mix(in srgb,var(--accent) 12%, transparent); }

/* badge pop tag */
.tag{ display:inline-flex; align-items:center; gap:7px; font-family:var(--font-display); font-weight:700; font-size:14px; padding:6px 13px; border-radius:999px; }

/* footer */
.footer{ background:var(--navy-deep); color:#dce6f5; padding:70px 0 34px; }
.footer h4{ color:#fff; }
.footer a{ color:#aebfd8; transition:.15s; } .footer a:hover{ color:#fff; }

/* ---- gentle card hover (playful "hover effects" the brief asked for) ---- */
.lift{ transition:calc(var(--motion)*.2s) transform, calc(var(--motion)*.2s) box-shadow; }
.lift:hover{ transform:translateY(-6px); box-shadow:var(--shadow-lift); }

/* ============================================================ booking modal */
.bk-overlay{
  position:fixed; inset:0; z-index:200; display:flex; align-items:flex-start; justify-content:center;
  background:rgba(20,32,60,.55); backdrop-filter:blur(5px); overflow-y:auto; padding:clamp(12px,4vw,48px) 14px;
}
.bk-card{ width:min(720px,100%); overflow:hidden; animation:pop-in .35s ease both; margin-bottom:40px; }
.bk-head{ background:var(--navy); color:#fff; padding:22px 28px; display:flex; align-items:center; gap:14px; }
.bk-head img{ height:42px; }
.bk-close{ width:38px;height:38px;border-radius:12px; background:rgba(255,255,255,.14); color:#fff; font-size:22px; line-height:1; }
.bk-progress{ display:flex; gap:5px; padding:16px 28px 0; }
.bk-progress i{ flex:1; height:7px; border-radius:999px; background:var(--line); transition:.3s; display:block; }
.bk-progress i.on{ background:var(--accent); }
.bk-body{ padding:26px 28px 30px; }
.bk-foot{ display:flex; align-items:center; gap:12px; margin-top:28px; padding-top:20px; border-top:1px solid var(--line); }
.bk-input{
  width:100%; padding:13px 16px; border-radius:14px; font-size:16px; font-family:var(--font-body);
  border:2px solid var(--line); background:var(--surface); color:var(--ink); outline:none; transition:.15s;
}
.bk-input:focus{ border-color:var(--accent); }
.bk-field-label{ display:block; font-family:var(--font-display); font-weight:700; font-size:14.5px; color:var(--brand); margin-bottom:7px; }
.bk-field-hint{ display:block; color:var(--ink-soft); font-size:13px; margin-top:5px; }
.bk-field-err{ display:block; color:var(--red); font-size:13px; margin-top:5px; font-weight:700; }
.qty-btn{ width:34px; height:34px; border-radius:10px; background:color-mix(in srgb,var(--accent) 14%,transparent); color:var(--accent); font-size:20px; font-weight:800; line-height:1; display:flex; align-items:center; justify-content:center; }

#root{ overflow:hidden; }
.app-loading{ min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Baloo 2',sans-serif; color:#1b3a73; font-size:22px; }

/* floating book button (mobile) */
.fab{ display:none; position:fixed; bottom:22px; right:22px; z-index:90; box-shadow:0 18px 36px -12px rgba(0,0,0,.4); padding:15px 24px; font-size:17px; }
@media(max-width:1080px){ .fab{ display:inline-flex; } }
@media(max-width:560px){ .fab{ bottom:16px; right:16px; padding:13px 20px; font-size:15px; } }

/* ============================================================ responsive grids */
@media(max-width:900px){
  .hero-copy{ text-align:center; }
  .hero-copy .eyebrow, .hero-copy h1{ margin-inline:auto; }
  .hero-copy .hero-actions, .hero-copy .hero-stats{ justify-content:center; }
  .hero-inner{ grid-template-columns:1fr!important; }
  .hero-visual{ margin-top:40px; max-width:460px; margin-inline:auto; }
}
@media(max-width:1080px){ .attr-grid{ grid-template-columns:repeat(3,1fr)!important; } }
@media(max-width:760px){ .attr-grid{ grid-template-columns:repeat(2,1fr)!important; } }
@media(max-width:460px){ .attr-grid{ grid-template-columns:1fr!important; } }
@media(max-width:820px){ .price-grid{ grid-template-columns:1fr!important; } .price-grid .card{ transform:none!important; } .pass-grid{ grid-template-columns:1fr!important; } }
@media(max-width:920px){ .pkg-grid{ grid-template-columns:1fr!important; max-width:460px; margin-inline:auto; } }
@media(max-width:860px){ .visit-grid{ grid-template-columns:1fr!important; } .about-grid{ grid-template-columns:1fr!important; } .faq-grid{ grid-template-columns:1fr!important; } }
@media(max-width:760px){ .gal-grid{ grid-template-columns:repeat(2,1fr)!important; } }
@media(max-width:880px){ .footer-grid{ grid-template-columns:1fr 1fr!important; } }
@media(max-width:560px){ .footer-grid{ grid-template-columns:1fr!important; } }
@media(max-width:520px){ .bk-row{ grid-template-columns:1fr!important; } }
</style>
</head>

   7 FUNDAYS PARK — cartoon toolkit (SVG decoration helpers)
   ============================================================ */

function Cloud(size, color, cls, style){
  return `<svg width="${size}" height="${size*0.62}" viewBox="0 0 100 62" class="${cls||''}" style="${style||''}" aria-hidden="true"><g fill="${color}"><circle cx="30" cy="34" r="22"/><circle cx="52" cy="24" r="26"/><circle cx="74" cy="36" r="20"/><rect x="14" y="38" width="72" height="20" rx="10"/></g></svg>`;
}
function Star(size, color, style, cls){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" class="${cls||''}" style="${style||''}" aria-hidden="true"><path d="M12 2.2c.7 0 1.3.4 1.6 1l2.3 4.7 5.2.8c1.5.2 2 2 1 3l-3.8 3.7.9 5.2c.3 1.5-1.3 2.6-2.6 1.9L12 21l-4.6 2.4c-1.3.7-2.9-.4-2.6-1.9l.9-5.2L1.9 12.5c-1-1-.5-2.8 1-3l5.2-.8 2.3-4.7c.3-.6.9-1 1.6-1z" fill="${color}" stroke="rgba(0,0,0,.07)" stroke-width="1" stroke-linejoin="round"/></svg>`;
}
function Sparkle(size, color, style, cls){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" class="${cls||''}" style="${style||''}" aria-hidden="true"><path d="M12 0c.6 5.8 5.6 10.8 11.4 11.4C17.6 12 12.6 17 12 22.8 11.4 17 6.4 12 0.6 11.4 6.4 10.8 11.4 5.8 12 0z" fill="${color}"/></svg>`;
}
function Squiggle(color, width){
  width = width || 180;
  return `<svg viewBox="0 0 200 14" width="${width}" height="14" fill="none" style="display:block;margin-top:6px" aria-hidden="true"><path d="M2 9 C 26 2, 42 2, 64 8 S 110 14, 134 7 S 178 2, 198 8" stroke="${color}" stroke-width="5" stroke-linecap="round"/></svg>`;
}
function Hill(color){
  return `<svg class="hill" viewBox="0 0 1440 120" preserveAspectRatio="none" style="height:90px" aria-hidden="true"><path d="M0,64 C220,118 420,18 720,52 C1010,84 1230,18 1440,58 L1440,120 L0,120 Z" fill="${color}"/></svg>`;
}
function Scallop(color, style){
  return `<svg viewBox="0 0 1440 70" preserveAspectRatio="none" style="display:block;width:100%;height:56px;transform:scaleY(-1);${style||''}" aria-hidden="true"><path d="M0,70 L0,40 Q60,0 120,40 T240,40 T360,40 T480,40 T600,40 T720,40 T840,40 T960,40 T1080,40 T1200,40 T1320,40 T1440,40 L1440,70 Z" fill="${color}"/></svg>`;
}
function Balloon(color, size, style, anim){
  anim = anim || "floaty";
  return `<svg width="${size}" height="${size*1.4}" viewBox="0 0 60 84" style="animation:${anim} 7s ease-in-out infinite;${style||''}" aria-hidden="true"><ellipse cx="30" cy="28" rx="26" ry="30" fill="${color}"/><ellipse cx="22" cy="18" rx="7" ry="9" fill="rgba(255,255,255,.35)"/><path d="M30 58 L27 64 L33 64 Z" fill="${color}"/><path d="M30 64 q6 8 0 18" stroke="rgba(0,0,0,.18)" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`;
}
function DotField(color, opacity){
  const id = "dots" + Math.random().toString(36).slice(2,7);
  return `<svg aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:${opacity}"><defs><pattern id="${id}" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="6" cy="6" r="3.4" fill="${color}"/></pattern></defs><rect width="100%" height="100%" fill="url(#${id})"/></svg>`;
}
function Ph(label, style, cls){
  return `<div class="ph ${cls||''}" style="${style||''}"><span>${label}</span></div>`;
}
function FloatingShapes(){
  const items = [
    { type:"balloon", c:"var(--red)",   size:50, top:"14%", left:"5%",  anim:"floaty-slow", d:"0s" },
    { type:"star",    c:"var(--gold)",  size:30, top:"20%", left:"88%", anim:"wiggle",      d:".4s" },
    { type:"dot",     c:"var(--teal)",  size:16, top:"60%", left:"3%",  anim:"floaty",      d:".6s" },
    { type:"sparkle", c:"var(--purple)",size:24, top:"72%", left:"92%", anim:"floaty",      d:"1.1s" },
    { type:"star",    c:"var(--green)", size:22, top:"44%", left:"95%", anim:"wiggle",      d:".9s" },
    { type:"dot",     c:"var(--pink)",  size:12, top:"30%", left:"12%", anim:"floaty-slow", d:"1.4s" }
  ];
  const inner = items.map((it,i) => {
    const common = `position:absolute;top:${it.top};left:${it.left};animation:${it.anim} ${6+i}s ease-in-out ${it.d} infinite`;
    if (it.type === "balloon") return `<span style="${common}">${Balloon(it.c, it.size, '', 'floaty')}</span>`;
    if (it.type === "star") return Star(it.size, it.c, `${common};opacity:.85`);
    if (it.type === "sparkle") return Sparkle(it.size, it.c, `${common};opacity:.85`);
    return `<span style="${common};width:${it.size}px;height:${it.size}px;border-radius:50%;background:${it.c};opacity:.5"></span>`;
  }).join("");
  return `<div aria-hidden="true" style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0">${inner}</div>`;
}

/* section heading helper */
function SectionHead({ eyebrow, title, lead, center, light, squiggle = true }){
  const align = center ? "center" : "left";

    ${lead ? `<p class="lead reveal" data-delay="160" style="margin-top:12px;${light?'color:rgba(255,255,255,.85)':''}">${lead}</p>` : ""}
  </div>`;
}
</script>

        ${D.gallery.map((g,i) => `<div class="reveal" data-delay="${(i%4)*60}" style="grid-column:${i===0||i===5?'span 2':'span 1'};grid-row:${i===0||i===5?'span 2':'span 1'}">
          ${Ph(g,"width:100%;height:100%;min-height:130px;border-radius:18px")}
        </div>`).join("")}
      </div>
    </div>
  </section>`;
}

function FAQ(){
  return `<section style="background:var(--bg-tint);position:relative">
    ${DotField("var(--accent)",0.06)}
    ${Scallop("var(--bg)","margin-bottom:-1px")}
    <div class="section" id="faq" style="padding-top:24px;position:relative">
      <div class="wrap faq-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:46px;align-items:start">
        <div>
          ${SectionHead({ eyebrow:"FAQ", title:"What parents ask most" })}
          <div id="faq-list" style="display:flex;flex-direction:column;gap:12px">
            ${D.faqs.map((f,i) => `<div class="card" style="padding:0;overflow:hidden">
              <button class="faq-q" data-faq="${i}" style="width:100%;text-align:left;padding:18px 22px;display:flex;justify-content:space-between;gap:14px;align-items:center;color:var(--brand);font-family:var(--font-display);font-weight:700;font-size:16.5px">
                ${f.q}
                <span class="faq-plus" style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;transition:.25s transform;${i===0?'transform:rotate(45deg)':''}">+</span>
              </button>
              <div class="faq-a" style="max-height:${i===0?'240px':'0'};transition:max-height .3s ease;overflow:hidden">
                <p style="padding:0 22px 20px;font-size:15px;color:var(--ink-soft);line-height:1.7">${f.a}</p>
              </div>
            </div>`).join("")}
          </div>
        </div>
        <div id="rules">
          ${SectionHead({ eyebrow:"Rules & Waiver", title:"Play safe, play hard" })}
          <div class="card" style="padding:26px 28px">
            <ul style="list-style:none;padding:0;margin:0">
              ${D.rules.map((r,i) => `<li style="display:flex;gap:12px;padding:11px 0;border-bottom:${i<D.rules.length-1?'1px solid var(--line)':'none'};font-size:15.5px">
                <span style="flex-shrink:0;width:24px;height:24px;border-radius:8px;background:var(--gold);color:var(--navy-deep);font-family:var(--font-display);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center">${i+1}</span>${r}
              </li>`).join("")}
            </ul>
            <div style="margin-top:22px;padding:18px 20px;border-radius:16px;background:color-mix(in srgb,var(--accent) 10%, transparent);display:flex;gap:14px;align-items:center;flex-wrap:wrap">
              <span style="font-size:26px">✍️</span>
              <div style="flex:1;min-width:180px">
                <strong style="font-family:var(--font-display);color:var(--brand)">Sign the waiver online</strong>
                <p style="font-size:14px;color:var(--ink-soft)">Skip the line on arrival — takes a couple minutes.</p>
              </div>
              <button class="btn btn-primary" style="padding:11px 22px;font-size:15px">Sign waiver</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    ${Hill("var(--bg)")}
  </section>`;
}

function Footer(){
  const social = ["Instagram","Facebook","TikTok"];
  return `<footer class="footer" id="contact">
    <div class="wrap">
      <div class="footer-grid" style="display:grid;grid-template-columns:1.4fr 1fr 1fr 1.2fr;gap:40px">
        <div>
          <img src="assets/wordmark.png" alt="7 Fundays Park" style="height:54px;background:#fff;padding:8px 12px;border-radius:14px" />
          <p style="margin-top:18px;color:#aebfd8;font-size:16px;max-width:300px">Langham's indoor prairie playground. Rain, snow or shine — the fun never stops. 🌾</p>
          <div style="display:flex;gap:10px;margin-top:20px">
            ${social.map(s => `<a href="#" aria-label="${s}" style="width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">${s[0]}</a>`).join("")}
          </div>
        </div>
        <div>
          <h4 style="font-size:17px;margin-bottom:16px">Explore</h4>
          ${NAV_LINKS.map(([label,id]) => `<a href="#${id}" data-scroll="${id}" style="display:block;padding:6px 0;font-weight:600">${label}</a>`).join("")}
        </div>
        <div>
          <h4 style="font-size:17px;margin-bottom:16px">Hours</h4>
          ${D.hours.map(h => `<div style="font-size:14.5px;padding:4px 0;color:#aebfd8"><strong style="color:#fff;font-weight:700">${h.day}</strong><br/>${h.time}</div>`).join("")}
        </div>
        <div>
          <h4 style="font-size:17px;margin-bottom:16px">Find us</h4>
          <p style="color:#aebfd8;font-size:15px;line-height:1.7">${D.brand.address}</p>
          <p style="margin-top:12px"><a href="tel:${D.brand.phone}" style="font-weight:800;color:#fff;font-size:18px;font-family:var(--font-display)">${D.brand.phone}</a></p>
          <p style="margin-top:4px"><a href="mailto:${D.brand.email}">${D.brand.email}</a></p>
          <button class="btn btn-sun" style="margin-top:18px" data-book>🎉 Book a Party</button>
        </div>
      </div>
      <div style="border-top:1px solid rgba(255,255,255,.12);margin-top:44px;padding-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;color:#8fa2c0;font-size:13.5px">
        <span>© ${new Date().getFullYear()} 7 Fundays Park · Langham, Saskatchewan</span>
        <span>Built with 🎈 and a little prairie sunshine</span>

<script>
/* ============================================================
   7 FUNDAYS PARK — party reservation flow (booking modal)
   ============================================================ */
const STEPS = ["Package", "Date & Time", "Details", "Add-ons", "Contact", "Review"];

const Booking = {
  open:false, step:0, done:false, showErr:false,
  form:{ pkg:"harvest", date:"", time:"", guests:10, childName:"", childAge:"", theme:D.themes[0], addons:{}, parentName:"", email:"", phone:"", notes:"" },

  start(pkgKey){
    this.open = true; this.step = 0; this.done = false; this.showErr = false;
    this.form = { pkg: pkgKey || "harvest", date:"", time:"", guests:10, childName:"", childAge:"", theme:D.themes[0], addons:{}, parentName:"", email:"", phone:"", notes:"" };
    document.body.style.overflow = "hidden";
    this.render();
  },
  close(){
    this.open = false;
    document.body.style.overflow = "";
    const el = document.getElementById("booking-mount");
    if (el) el.innerHTML = "";
  },
  pkg(){ return D.packages.find(p => p.key === this.form.pkg) || D.packages[1]; },
  base(){ return parseInt(this.pkg().price, 10); },
  addonTotal(){ return D.addons.reduce((s,a) => s + (this.form.addons[a.key]||0)*a.price, 0); },
  total(){ return this.base() + this.addonTotal(); },

  errs(){
    const f = this.form, e = {}, s = this.step;
    if (s===1){ if(!f.date) e.date="Please pick a date"; if(!f.time) e.time="Please pick a time"; }
    if (s===2){
      if(!String(f.childName).trim()) e.childName="Please add the birthday star's name";
      if(!f.childAge) e.childAge="Please add an age";
      if(!f.guests || f.guests<1) e.guests="Please add a headcount";
    }
    if (s===4){
      if(!String(f.parentName).trim()) e.parentName="Please add your name";
      if(!/^\S+@\S+\.\S+$/.test(f.email)) e.email="Please enter a valid email";
      if(String(f.phone).replace(/\D/g,"").length < 7) e.phone="Please enter a valid phone";
    }
    return e;
  },
  next(){
    const e = this.errs();
    if (Object.keys(e).length){ this.showErr = true; this.render(); return; }
    this.showErr = false;
    if (this.step < STEPS.length-1) this.step++;
    else { this.done = true; this.fireConfetti(); }
    this.render();
  },
  back(){ this.showErr = false; if (this.step>0) this.step--; this.render(); },
  set(k,v){ this.form[k]=v; },
  setQty(k,q){ this.form.addons[k] = Math.max(0, q); this.render(); },

  E(k){ return this.showErr ? (this.errs()[k]||"") : ""; },

  field(label, inner, hint, err){
    return `<label style="display:block">
      <span class="bk-field-label">${label}</span>${inner}
      ${err ? `<span class="bk-field-err">${err}</span>` : hint ? `<span class="bk-field-hint">${hint}</span>` : ""}
    </label>`;
  },

  stepPackage(){
    return `<div>
      <h3 class="h-lg" style="font-size:23px;margin-bottom:6px">Pick a party package</h3>
      <p style="color:var(--ink-soft);font-size:15px;margin-bottom:20px">You can add pizza, goodie bags and more later — no wrong answers here.</p>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${D.packages.map(p => { const sel = this.form.pkg===p.key; return `
          <button data-set-pkg="${p.key}" style="display:flex;align-items:center;gap:16px;text-align:left;padding:16px 18px;border-radius:18px;border:2.5px solid ${sel?p.color:'var(--line)'};background:${sel?`color-mix(in srgb,${p.color} 9%, var(--surface))`:'var(--surface)'};transition:.15s">
            <span style="font-size:34px">${p.emoji}</span>
            <div style="flex:1">
              <div style="font-family:var(--font-display);font-weight:800;font-size:18px;color:${sel?p.color:'var(--brand)'}">${p.name}</div>
              <div style="font-size:13.5px;color:var(--ink-soft)">${p.kids} · ${p.duration}</div>
            </div>
            <div style="font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--brand)">$${p.price}</div>
            <span style="width:24px;height:24px;border-radius:50%;border:2.5px solid ${sel?p.color:'var(--line)'};background:${sel?p.color:'transparent'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900">${sel?'✓':''}</span>
          </button>`; }).join("")}
      </div>
    </div>`;
  },
  stepDate(){
    const today = new Date().toISOString().split("T")[0];
    return `<div>
      <h3 class="h-lg" style="font-size:23px;margin-bottom:16px">When's the celebration?</h3>
      <div style="display:grid;grid-template-columns:1fr;gap:18px">
        ${this.field("Party date", `<input type="date" min="${today}" value="${this.form.date}" data-set="date" class="bk-input" />`, null, this.E("date"))}
        ${this.field("Time slot",
          `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
            ${D.timeslots.map(t => { const sel = this.form.time===t; return `<button data-set-time="${t}" style="padding:13px 0;border-radius:13px;font-family:var(--font-display);font-weight:700;font-size:16px;border:2.5px solid ${sel?'var(--accent)':'var(--line)'};background:${sel?'var(--accent)':'var(--surface)'};color:${sel?'#fff':'var(--ink)'};transition:.15s">${t}</button>`; }).join("")}
          </div>`,
          "Each slot runs the full length of your package", this.E("time"))}
      </div>
    </div>`;
  },
  stepDetails(){
    const f = this.form;
    return `<div>
      <h3 class="h-lg" style="font-size:23px;margin-bottom:16px">Tell us about the birthday star</h3>
      <div class="bk-row" style="display:grid;grid-template-columns:1.4fr .6fr;gap:16px">
        ${this.field("Birthday star's name", `<input value="${f.childName}" data-set="childName" placeholder="e.g. Maple" class="bk-input" />`, null, this.E("childName"))}
        ${this.field("Turning", `<input type="number" min="1" max="17" value="${f.childAge}" data-set="childAge" placeholder="age" class="bk-input" />`, null, this.E("childAge"))}
      </div>
      <div style="margin-top:16px">
        ${this.field(`Number of kids (incl. the star): ${f.guests}`,
          `<input type="range" min="4" max="24" value="${f.guests}" data-set-range="guests" style="width:100%;accent-color:var(--accent)" />
           <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:2px"><span>4</span><span>24</span></div>`,
          "You can adjust before the party", this.E("guests"))}
      </div>
      <div style="margin-top:16px">
        ${this.field("Party theme",
          `<div style="display:flex;flex-wrap:wrap;gap:9px">
            ${D.themes.map(t => { const sel = f.theme===t; return `<button class="tag" data-set-theme="${t}" style="border:2px solid ${sel?'var(--accent)':'var(--line)'};background:${sel?'color-mix(in srgb,var(--accent) 14%,transparent)':'var(--surface)'};color:${sel?'var(--accent)':'var(--ink)'};padding:9px 15px;font-size:14px">${t}</button>`; }).join("")}
          </div>`)}
      </div>
    </div>`;
  },
  stepAddons(){
    return `<div>
      <h3 class="h-lg" style="font-size:23px;margin-bottom:6px">Add a little extra?</h3>
      <p style="color:var(--ink-soft);font-size:15px;margin-bottom:20px">All optional — keeping it simple is totally fine too.</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${D.addons.map(a => { const q = this.form.addons[a.key]||0; return `
          <div style="display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:15px;border:2px solid ${q?'var(--accent)':'var(--line)'};background:${q?'color-mix(in srgb,var(--accent) 7%,transparent)':'var(--surface)'};transition:.15s">
            <span style="font-size:26px">${a.emoji}</span>
            <div style="flex:1">
              <div style="font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--brand)">${a.label}</div>
              <div style="font-size:13.5px;color:var(--ink-soft)">$${a.price} each</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <button class="qty-btn" data-qty="${a.key}" data-dir="-1" ${q===0?'disabled style="opacity:.4"':''}>−</button>
              <span style="min-width:22px;text-align:center;font-family:var(--font-display);font-weight:800;font-size:18px">${q}</span>
              <button class="qty-btn" data-qty="${a.key}" data-dir="1">+</button>
            </div>
          </div>`; }).join("")}
      </div>
    </div>`;
  },
  stepContact(){
    const f = this.form;
    return `<div>
      <h3 class="h-lg" style="font-size:23px;margin-bottom:16px">How do we reach you?</h3>
      <div style="display:grid;gap:16px">
        ${this.field("Parent / guardian name", `<input value="${f.parentName}" data-set="parentName" placeholder="Your name" class="bk-input" />`, null, this.E("parentName"))}
        <div class="bk-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          ${this.field("Email", `<input type="email" value="${f.email}" data-set="email" placeholder="you@email.com" class="bk-input" />`, "Confirmation goes here", this.E("email"))}
          ${this.field("Phone", `<input type="tel" value="${f.phone}" data-set="phone" placeholder="(306) 555-0000" class="bk-input" />`, null, this.E("phone"))}
        </div>
        ${this.field("Special requests / notes (optional)", `<textarea data-set="notes" rows="3" placeholder="Anything you'd like us to know" class="bk-input" style="resize:vertical">${f.notes}</textarea>`, "Allergies, accessibility needs, surprise plans — let us know")}
      </div>
    </div>`;
  },
  stepReview(){
    const f = this.form, pkg = this.pkg(), at = this.addonTotal(), total = this.total(), deposit = 50;
    const row = (label, value) => `<div style="display:flex;justify-content:space-between;gap:16px;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px"><span style="color:var(--ink-soft);font-weight:600">${label}</span><span style="font-weight:700;color:var(--ink);text-align:right">${value}</span></div>`;
    const chosen = D.addons.filter(a => f.addons[a.key]);
    return `<div>
      <h3 class="h-lg" style="font-size:23px;margin-bottom:16px">Quick check, then let's party 🎉</h3>
      <div class="card" style="padding:18px 22px;box-shadow:none;border:2px solid var(--line)">
        ${row("Package", `${pkg.emoji} ${pkg.name}`)}
        ${row("Date & time", `${f.date||"—"} · ${f.time||"—"}`)}
        ${row("Birthday star", `${f.childName||"—"}${f.childAge?` · turning ${f.childAge}`:""}`)}
        ${row("Headcount", `${f.guests} kids`)}
        ${row("Theme", f.theme)}
        ${chosen.length ? row("Add-ons", chosen.map(a => `${a.label} ×${f.addons[a.key]}`).join(", ")) : ""}
        ${row("Contact", `${f.parentName||"—"} · ${f.phone||"—"}`)}
      </div>
      <div style="margin-top:18px;padding:18px 22px;border-radius:16px;background:var(--navy);color:#fff">
        <div style="display:flex;justify-content:space-between;font-size:15px;padding:3px 0;color:rgba(255,255,255,.82)"><span>${pkg.name} package</span><span>$${pkg.price}</span></div>
        ${at>0 ? `<div style="display:flex;justify-content:space-between;font-size:15px;padding:3px 0;color:rgba(255,255,255,.82)"><span>Add-ons</span><span>$${at}</span></div>` : ""}
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;padding-top:10px;border-top:1px solid rgba(255,255,255,.18)">
          <span style="font-family:var(--font-display);font-weight:800;font-size:18px">Estimated total</span>
          <span style="font-family:var(--font-display);font-weight:800;font-size:28px">$${total}</span>
        </div>
        <div style="margin-top:12px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.12);font-size:13.5px;display:flex;gap:10px;align-items:center">
          <span style="font-size:20px">🔒</span>
          <span>Pay just a <strong style="color:var(--gold)">$${deposit} deposit</strong> today to lock your slot. The balance of <strong>$${total-deposit}</strong> is due on party day. Deposit is non-refundable but reschedulable.</span>
        </div>
      </div>
    </div>`;
  },
  success(){
    const f = this.form, pkg = this.pkg(), total = this.total(), deposit = 50;
    if (!this._bookingNo) this._bookingNo = "#FD" + Math.floor(1000 + Math.random()*9000);
    return `<div style="text-align:center;padding:10px 0 6px">
      <div style="font-size:58px;animation:bob 1.6s ease-in-out infinite">🎉</div>
      <h3 class="h-xl" style="font-size:30px;margin-top:8px">You're booked!</h3>
      <p style="color:var(--ink-soft);font-size:16px;margin-top:10px;max-width:460px;margin-inline:auto">
        ${f.childName?`${f.childName}'s`:"Your"} ${pkg.emoji} ${pkg.name} is locked in for <strong style="color:var(--brand)">${f.date} at ${f.time}</strong>. A confirmation is on its way to <strong>${f.email}</strong>.
      </p>
      <div class="card" style="display:inline-flex;gap:28px;padding:16px 26px;margin-top:22px;box-shadow:none;border:2px solid var(--line);flex-wrap:wrap;justify-content:center">
        <div><div style="font-size:12px;color:var(--ink-soft);font-weight:700">Deposit paid</div><div style="font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--green)">$${deposit}</div></div>
        <div><div style="font-size:12px;color:var(--ink-soft);font-weight:700">Due on arrival</div><div style="font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--brand)">$${total-deposit}</div></div>
        <div><div style="font-size:12px;color:var(--ink-soft);font-weight:700">Booking #</div><div style="font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--brand)">${this._bookingNo}</div></div>
      </div>
      <p style="font-size:13.5px;color:var(--ink-soft);margin-top:18px">Tip: arrive 20 minutes early and sign the waiver online beforehand 😊</p>
      <button class="btn btn-primary btn-lg" style="margin-top:18px" data-book-close>Awesome, done</button>
    </div>`;
  },

  fireConfetti(){
    const colors = ["var(--red)","var(--gold)","var(--green)","var(--sky)","var(--purple)","var(--teal)","var(--pink)"];
    let bits = "";
    for (let i=0;i<80;i++){
      const left = Math.random()*100, delay = Math.random()*0.6, dur = 2.4 + Math.random()*1.8;
      const size = 8 + Math.random()*8, c = colors[i%colors.length], round = Math.random()>0.5;
      bits += `<span style="position:absolute;top:-20px;left:${left}%;width:${size}px;height:${size*(round?1:1.6)}px;background:${c};border-radius:${round?'50%':'2px'};opacity:.9;animation:confetti-fall ${dur}s cubic-bezier(.3,.5,.5,1) ${delay}s forwards"></span>`;
    }
    const layer = document.createElement("div");
    layer.setAttribute("aria-hidden","true");
    layer.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden";
    layer.innerHTML = bits;
    document.body.appendChild(layer);
    setTimeout(() => layer.remove(), 5000);
  },

  render(){
    const mount = document.getElementById("booking-mount");
    if (!mount) return;
    if (!this.open){ mount.innerHTML = ""; return; }
    const s = this.step, done = this.done;
    let bodyHtml;
    if (done) bodyHtml = this.success();
    else {
      const stepView = [this.stepPackage, this.stepDate, this.stepDetails, this.stepAddons, this.stepContact, this.stepReview][s].call(this);
      const total = this.total();
      bodyHtml = `${stepView}
        <div class="bk-foot">
          ${s>0 ? `<button class="btn btn-ghost" data-bk-back>← Back</button>` : ""}
          <div style="margin-left:auto;display:flex;align-items:center;gap:16px">
            ${s>=3 ? `<div style="text-align:right"><div style="font-size:12px;color:var(--ink-soft);font-weight:700">Est. total</div><div style="font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--brand)">$${total}</div></div>` : ""}
            <button class="btn btn-primary" data-bk-next>${s===STEPS.length-1 ? "Confirm booking 🎉" : "Next →"}</button>
          </div>
        </div>`;
    }
    mount.innerHTML = `<div class="bk-overlay" data-bk-overlay>
      <div class="card bk-card">
        <div class="bk-head">
          <img src="assets/badge.png" alt="" />
          <div style="flex:1">
            <div style="font-family:var(--font-display);font-weight:800;font-size:20px">${done?"Party booked!":"Book a Birthday Party"}</div>
            <div style="font-size:13.5px;color:rgba(255,255,255,.75)">${done?"We can't wait 🎉":`Step ${s+1} of ${STEPS.length} · ${STEPS[s]}`}</div>
          </div>
          <button class="bk-close" aria-label="Close" data-book-close>×</button>
        </div>
        ${!done ? `<div class="bk-progress">${STEPS.map((_,i) => `<i class="${i<=s?'on':''}"></i>`).join("")}</div>` : ""}
        <div class="bk-body">${bodyHtml}</div>
      </div>
    </div>`;
  }
};
</script>

<script>
/* ============================================================
   7 FUNDAYS PARK — boot + interactions
   ============================================================ */
(function(){
  function scrollToId(id){
    if (id === "top"){ window.scrollTo({ top:0, behavior:"smooth" }); return; }
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 70, behavior:"smooth" });
  }

  function render(){
    const root = document.getElementById("root");
    root.innerHTML =
      Nav() +
      "<main>" + Hero() + Attractions() + Pricing() + Packages() + Visit() + About() + Gallery() + FAQ() + "</main>" +
      Footer() +
      `<button class="btn btn-primary fab" data-book>🎉 Book a Party</button>` +
      `<div id="booking-mount"></div>`;
  }

  function wire(){
    // nav scroll shadow
    const nav = document.getElementById("nav");
    const onScroll = () => { if (nav) nav.classList.toggle("scrolled", window.scrollY > 12); };
    window.addEventListener("scroll", onScroll); onScroll();

    // burger / mobile menu
    const burger = document.getElementById("burger");
    const menu = document.getElementById("mobile-menu");
    if (burger && menu) burger.addEventListener("click", () => menu.classList.toggle("open"));

    // delegated clicks
    document.body.addEventListener("click", (e) => {
      const t = e.target.closest("[data-scroll],[data-book],[data-book-close],[data-faq],[data-set-pkg],[data-set-time],[data-set-theme],[data-qty],[data-bk-next],[data-bk-back],[data-bk-overlay]");
      if (!t) return;

      if (t.hasAttribute("data-scroll")){ e.preventDefault(); if (menu) menu.classList.remove("open"); scrollToId(t.getAttribute("data-scroll")); return; }
      if (t.hasAttribute("data-book")){ const k = t.getAttribute("data-book"); if (menu) menu.classList.remove("open"); Booking.start(k || null); return; }
      if (t.hasAttribute("data-book-close")){ Booking.close(); return; }
      if (t.hasAttribute("data-bk-overlay") && e.target === t){ Booking.close(); return; }
      if (t.hasAttribute("data-bk-next")){ Booking.next(); return; }
      if (t.hasAttribute("data-bk-back")){ Booking.back(); return; }
      if (t.hasAttribute("data-set-pkg")){ Booking.set("pkg", t.getAttribute("data-set-pkg")); Booking.render(); return; }
      if (t.hasAttribute("data-set-time")){ Booking.set("time", t.getAttribute("data-set-time")); Booking.render(); return; }
      if (t.hasAttribute("data-set-theme")){ Booking.set("theme", t.getAttribute("data-set-theme")); Booking.render(); return; }
      if (t.hasAttribute("data-qty")){ const k = t.getAttribute("data-qty"); const dir = parseInt(t.getAttribute("data-dir"),10); Booking.setQty(k, (Booking.form.addons[k]||0) + dir); return; }

      // FAQ accordion
      if (t.hasAttribute("data-faq")){
        const idx = parseInt(t.getAttribute("data-faq"),10);
        const list = document.getElementById("faq-list");
        Array.from(list.children).forEach((card, i) => {
          const plus = card.querySelector(".faq-plus");
          const ans = card.querySelector(".faq-a");
          const willOpen = i === idx && ans.style.maxHeight === "0px";
          // toggle: close all, open the clicked one if it was closed
          if (i === idx && ans.style.maxHeight !== "0px"){ ans.style.maxHeight = "0px"; plus.style.transform = "none"; }
          else if (i === idx){ ans.style.maxHeight = "240px"; plus.style.transform = "rotate(45deg)"; }
          else { ans.style.maxHeight = "0px"; plus.style.transform = "none"; }
        });
        return;
      }
    });

    // booking inputs (delegated, change/input)
    const mount = document.getElementById("booking-mount");
    if (mount){
      const onInput = (e) => {
        const el = e.target;
        if (el.hasAttribute && el.hasAttribute("data-set")){ Booking.set(el.getAttribute("data-set"), el.value); }
        else if (el.hasAttribute && el.hasAttribute("data-set-range")){
          Booking.set(el.getAttribute("data-set-range"), parseInt(el.value,10));
          // live-update the label without losing slider focus
          const lbl = el.closest("label").querySelector(".bk-field-label");
          if (lbl) lbl.textContent = `Number of kids (incl. the star): ${el.value}`;
        }
      };
      mount.addEventListener("input", onInput);
      mount.addEventListener("change", (e) => {
        const el = e.target;
        if (el.hasAttribute && el.hasAttribute("data-set")) Booking.set(el.getAttribute("data-set"), el.value);
      });
    }

    // reveal on scroll
    const io = new IntersectionObserver((entries) => {
      entries.forEach((en) => { if (en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
    }, { threshold: 0.12 });
    document.querySelectorAll(".reveal").forEach((el) => {
      const d = el.getAttribute("data-delay");
      if (d) el.style.transitionDelay = d + "ms";
      io.observe(el);
    });

    // close booking on Escape
    document.addEventListener("keydown", (e) => { if (e.key === "Escape" && Booking.open) Booking.close(); });
  }

  render();
  wire();
})();
</script>
</body>
</html>
